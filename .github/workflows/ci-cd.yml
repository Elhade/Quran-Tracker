name: CI / CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Validation (tous les push / PR) ────────────────────────────────────────
  validate:
    name: Typecheck + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ── Build + Deploy (push sur main uniquement) ──────────────────────────────
  deploy:
    name: Build & Deploy → qurantracker.ghost-service.fr
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Cleanup old /moussy13 folder on server
        run: |
          python3 - <<'EOF'
          import ftplib
          def rmdir(ftp, path):
              try:
                  ftp.cwd(path)
              except:
                  return
              items = []
              ftp.retrlines('LIST', items.append)
              for item in items:
                  parts = item.split()
                  name = parts[-1]
                  if name in ('.', '..'):
                      continue
                  full = f"{path}/{name}"
                  if item.startswith('d'):
                      rmdir(ftp, full)
                  else:
                      try: ftp.delete(full)
                      except: pass
              try:
                  ftp.cwd('/')
                  ftp.rmd(path)
              except: pass

          import os
          ftp = ftplib.FTP_TLS()
          ftp.connect('qurantracker.ghost-service.fr', 21, timeout=30)
          ftp.login(os.environ['FTP_USERNAME'], os.environ['FTP_PASSWORD'])
          ftp.prot_p()
          ftp.set_pasv(True)
          rmdir(ftp, '/moussy13')
          print('Cleanup done')
          ftp.quit()
          EOF
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: qurantracker.ghost-service.fr
          port: 21
          protocol: ftps
          security: loose
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /
          # Ne re-upload que les fichiers modifiés (diff par hash)
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
